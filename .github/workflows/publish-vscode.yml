name: Publish VS Code Extension

on:
  push:
    tags:
      - 'vscode-v*'

defaults:
  run:
    working-directory: vscode-extension

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run compile
      - run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }}
